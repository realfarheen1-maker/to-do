<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <!-- Auth Form -->
    <div id="auth-section">
        <input type="email" placeholder="email" id="email"/>
        <input type="password" placeholder="password" id="password"/>
        <button onclick="login()">Login</button>
        <button onclick="register()">Register</button>
        <p id="auth-msg"></p>
    </div>

    <!-- Todo UI (hidden until logged in) -->
    <div id="todo-section" style="display:none">
        <button onclick="logout()">Logout</button>
        <br/><br/>
        <input type="text" placeholder="what to do next?" id="ip"/>
        <button onclick="fun()">Add</button>
        <ul id="ul"></ul>
    </div>

</body>

<script>
    const API = "https://to-do-c8w8.onrender.com"

    function getHeaders() {
        return {
            'Content-Type': 'application/json',
            'Authorization': 'Bearer ' + localStorage.getItem('token')
        }
    }

    async function register() {
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value
        const res = await fetch(API + '/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })
        const data = await res.json()
        document.getElementById('auth-msg').textContent = data.message || data.error
    }

    async function login() {
        const email = document.getElementById('email').value
        const password = document.getElementById('password').value
        const res = await fetch(API + '/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, password })
        })
        const data = await res.json()
        if (!res.ok) { document.getElementById('auth-msg').textContent = data.error; return }
        localStorage.setItem('token', data.token)
        showTodos()
    }

    function logout() {
        localStorage.removeItem('token')
        document.getElementById('auth-section').style.display = 'block'
        document.getElementById('todo-section').style.display = 'none'
    }

    function showTodos() {
        document.getElementById('auth-section').style.display = 'none'
        document.getElementById('todo-section').style.display = 'block'
        loadTodos()
    }

    async function loadTodos() {
        document.getElementById('ul').innerHTML = ""
        var res = await fetch(API + "/", { headers: getHeaders() })
        var ans = await res.json()
        for (var i = 0; i < ans.length; i++) {
            var li = document.createElement('li')
            li.innerHTML = ans[i].text
            var x = document.getElementById('ul')
            x.appendChild(li)
        }
    }

    async function fun() {
        await fetch(API + "/", {
            method: "POST",
            headers: getHeaders(),
            body: JSON.stringify(document.getElementById('ip').value)
        })
        loadTodos()
    }

    // Auto-login if token already saved
    if (localStorage.getItem('token')) showTodos()
</script>
</html>
